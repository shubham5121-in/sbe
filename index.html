<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Balaji Enterprise | DSA Management</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* CSS FROM style.css */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-color: #0f172a;
            --primary-light: #1e293b;
            --accent-color: #d97706;
            --accent-hover: #b45309;
            --bg-color: #f1f5f9;
            --surface-color: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-inverse: #f8fafc;
            --border-color: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --danger-bg: #fee2e2;
            --danger-text: #991b1b;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background: linear-gradient(180deg, var(--primary-color) 0%, var(--primary-light) 100%); color: var(--text-inverse); display: flex; flex-direction: column; padding: 1.5rem; }
        .nav-item { padding: 0.875rem 1rem; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; gap: 0.75rem; transition: var(--transition); color: #94a3b8; }
        .nav-item.active { background: rgba(217, 119, 6, 0.2); color: var(--accent-color); font-weight: 600; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 2.5rem; background-image: radial-gradient(circle at top right, #e2e8f0 0%, transparent 40%); }
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .auth-card { background: var(--surface-color); padding: 3rem; border-radius: var(--radius-lg); width: 100%; max-width: 450px; text-align: center; }

        .table-container { background: white; border-radius: var(--radius-lg); overflow-x: auto; box-shadow: var(--shadow-md); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        
        input, .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
        .btn { padding: 0.875rem 1.75rem; border: none; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary-color); color: white; }
        
        body.not-logged-in .sidebar, body.not-logged-in .main-content { display: none; }
        body.logged-in #auth-overlay { display: none; }
    </style>
</head>

<body class="not-logged-in">
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <div class="brand" style="justify-content:center; border:none; margin-bottom:1.5rem;">
                <i class="fas fa-university"></i>
                <div style="color:var(--primary-color)">SBE Config</div>
            </div>
            <h2>Welcome Back</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required style="margin-bottom:1rem;">
                <input type="password" id="login-password" placeholder="Password" required style="margin-bottom:1rem;">
                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </form>
            <div id="auth-error" style="color:red; margin-top:1rem; display:none;"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="brand"><i class="fas fa-university"></i> Shri Balaji</div>
        <ul class="nav-links">
            <li class="nav-item active" data-view="entry"><i class="fas fa-plus-circle"></i> <span>Daily Entry</span></li>
            <li class="nav-item" data-view="dashboard"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></li>
        </ul>
        <button id="logout-btn" class="btn" style="margin-top:auto; background:rgba(255,255,255,0.1); color:white;">Logout</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="page-title">Dashboard</h1>
            <div class="user-profile">
                <span id="user-display-name">User</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
        <div id="content-area"></div>
    </div>

    <script type="module">
        // FIREBASE INITIALIZATION
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwrYUYcQ6KggiA2Y0ublcA0v0-BpMp4Sw",
            authDomain: "sbe-4d7b4.firebaseapp.com",
            projectId: "sbe-4d7b4",
            storageBucket: "sbe-4d7b4.firebasestorage.app",
            messagingSenderId: "178352953312",
            appId: "1:178352953312:web:0f825092cf70362826fd85"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // APP STATE
        let loans = [];
        let currentUserRole = null;
        const COLLECTION_NAME = 'Loans';

        // DOM ELEMENTS
        const contentArea = document.getElementById('content-area');
        const loginForm = document.getElementById('login-form');

        // AUTH LOGIC
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.className = 'logged-in';
                loadView('entry');
                initDataSubscription();
            } else {
                document.body.className = 'not-logged-in';
            }
        });

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('auth-error').textContent = err.message;
                document.getElementById('auth-error').style.display = 'block';
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // CORE APP LOGIC
        function initDataSubscription() {
            const q = query(collection(db, COLLECTION_NAME), orderBy('date', 'desc'));
            onSnapshot(q, (snapshot) => {
                loans = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (document.querySelector('.nav-item.active').dataset.view === 'entry') renderEntryPage();
            });
        }

        function loadView(view) {
            contentArea.innerHTML = '';
            if (view === 'entry') renderEntryPage();
            // Additional view logic from app.js can be inserted here
        }

        function renderEntryPage() {
            contentArea.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Date</th><th>Customer</th><th>Bank</th><th>Amount</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            ${loans.map(loan => `
                                <tr>
                                    <td>${loan.date}</td>
                                    <td>${loan.customerName}</td>
                                    <td>${loan.bankName}</td>
                                    <td>₹${loan.amount}</td>
                                    <td>${loan.status}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // NAV INTERACTION
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                loadView(item.dataset.view);
            };
        });
    </script>
</body>
</html>
